name: Setup Mill caches
description: Restore/save Coursier and Mill output caches for squire's Mill builds

runs:
  using: composite
  steps:
    - name: Cache Coursier
      uses: actions/cache@v4
      with:
        path: ~/.cache/coursier
        # Coursier deps are job-independent — share one bucket across all jobs
        # (no github.job in the key).
        key: ${{ runner.os }}-coursier-${{ github.workflow }}-${{ hashFiles('build.mill.yaml', 'squire/**/package.mill', 'squire/**/package.mill.yaml', 'skills/**/package.mill', 'mill-build/**', '.mill-version') }}
        restore-keys: |
          ${{ runner.os }}-coursier-${{ github.workflow }}-
          ${{ runner.os }}-coursier-

    - name: Cache Mill out
      uses: actions/cache@v4
      with:
        path: out
        key: ${{ runner.os }}-mill-${{ github.workflow }}-${{ github.job }}-${{ hashFiles('build.mill.yaml', 'squire/**/package.mill', 'squire/**/package.mill.yaml', 'skills/**/package.mill', 'mill-build/**', '.mill-version') }}
        restore-keys: |
          ${{ runner.os }}-mill-${{ github.workflow }}-${{ github.job }}-
          ${{ runner.os }}-mill-
