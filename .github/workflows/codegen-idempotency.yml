name: codegen-idempotency
on:
  pull_request:
  push:
    branches: [main]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
      - name: Regenerate dist/ and assert no drift
        run: |
          ./mill skills.generateAll
          git diff --exit-code dist .claude-plugin/marketplace.json \
            || { echo "::error::dist/ is stale — run './mill skills.generateAll' and commit"; exit 1; }
