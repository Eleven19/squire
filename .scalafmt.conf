version = "3.9.4"
runner.dialect = scala3

maxColumn = 120
indent.main = 4
indent.callSite = 4
indent.defnSite = 4

align.preset = more
align.openParenCallSite = false
align.openParenDefnSite = false

newlines.topLevelStatementBlankLines = [
  { blanks { before = 1 } }
]

rewrite.rules = [
  RedundantBraces,
  RedundantParens,
  SortModifiers
]
